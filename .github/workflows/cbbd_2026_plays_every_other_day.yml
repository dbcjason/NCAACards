name: Pull 2026 CBBD Plays + Bart (Every Other Day 4AM ET)

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run now and bypass 4AM ET/every-other-day gate"
        required: false
        default: true
        type: boolean
      run_mode:
        description: "full = chunks+merge+bart, merge_only = merge staged chunks+bart, chunks_only = pull chunks only"
        required: false
        default: full
        type: choice
        options:
          - full
          - merge_only
          - chunks_only
  schedule:
    - cron: '5 8 * * *'
    - cron: '5 9 * * *'

jobs:
  chunked-plays:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'merge_only' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      STAGING_BRANCH: data-staging-2026
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        chunk:
          - { start: 1, end: 30, tag: "chunk001_030" }
          - { start: 31, end: 60, tag: "chunk031_060" }
          - { start: 61, end: 90, tag: "chunk061_090" }
          - { start: 91, end: 120, tag: "chunk091_120" }
          - { start: 121, end: 150, tag: "chunk121_150" }
          - { start: 151, end: 180, tag: "chunk151_180" }
          - { start: 181, end: 210, tag: "chunk181_210" }
          - { start: 211, end: 240, tag: "chunk211_240" }
          - { start: 241, end: 270, tag: "chunk241_270" }
          - { start: 271, end: 300, tag: "chunk271_300" }
          - { start: 301, end: 330, tag: "chunk301_330" }
          - { start: 331, end: 360, tag: "chunk331_360" }
          - { start: 361, end: 365, tag: "chunk361_365" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gate by 4AM ET every other day (manual always runs)
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_run }}" != "false" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            python3 player_cards_pipeline/scripts/is_4am_et_every_other_day.py > gate.txt
            echo "should_run=$(cat gate.txt)" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if outside scheduled window
        if: steps.gate.outputs.should_run != 'true'
        run: echo "Skipping run (event=${{ github.event_name }}, force_run=${{ inputs.force_run }}) outside gate window."

      - name: Install deps
        if: steps.gate.outputs.should_run == 'true'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pandas

      - name: Switch to staging branch
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git fetch origin --prune
          if git ls-remote --exit-code --heads origin "${STAGING_BRANCH}" >/dev/null 2>&1; then
            git checkout -B "${STAGING_BRANCH}" "origin/${STAGING_BRANCH}"
          else
            git checkout -B "${STAGING_BRANCH}" "origin/main"
            git push -u origin "${STAGING_BRANCH}"
          fi

      - name: Pull one chunk (regular+postseason)
        if: steps.gate.outputs.should_run == 'true'
        env:
          CBBD_API_KEY: ${{ secrets.CBBD_API_KEY }}
        run: |
          python3 pull_cbbd_lineups_plays_only_chunked_tmp.py \
            --year 2026 \
            --teams-csv "2025_team_results (1).csv" \
            --team-col "team" \
            --season-type both \
            --datasets plays \
            --team-start "${{ matrix.chunk.start }}" \
            --team-end "${{ matrix.chunk.end }}" \
            --chunk-tag "${{ matrix.chunk.tag }}" \
            --max-csv-mb 95 \
            --max-requests 3000 \
            --sleep-sec 0.15

      - name: Commit and push chunk progress to staging
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "${STAGING_BRANCH}" || true
          git add -f cbbd_seasons/2025-2026/tables/ || true
          git add -f cbbd_seasons/2025-2026/manifest/ || true
          if git diff --cached --quiet; then
            echo "No chunk changes to commit"
            exit 0
          fi
          git commit -m "Stage 2026 plays ${{ matrix.chunk.tag }}"
          git push origin "${STAGING_BRANCH}"

      - name: Upload chunk cache artifact
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cbbd-2026-${{ matrix.chunk.tag }}
          path: |
            cbbd_seasons/2025-2026/tables/*${{ matrix.chunk.tag }}*.csv
            cbbd_seasons/2025-2026/manifest/*${{ matrix.chunk.tag }}*
          if-no-files-found: warn
          retention-days: 2

  merge-and-bart:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'chunks_only' }}
    runs-on: ubuntu-latest
    needs: chunked-plays
    permissions:
      contents: write
    env:
      STAGING_BRANCH: data-staging-2026
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gate by 4AM ET every other day (manual always runs)
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_run }}" != "false" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            python3 player_cards_pipeline/scripts/is_4am_et_every_other_day.py > gate.txt
            echo "should_run=$(cat gate.txt)" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if outside scheduled window
        if: steps.gate.outputs.should_run != 'true'
        run: echo "Skipping run (event=${{ github.event_name }}, force_run=${{ inputs.force_run }}) outside gate window."

      - name: Install deps
        if: steps.gate.outputs.should_run == 'true'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pandas

      - name: Switch to staging branch
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git fetch origin --prune
          if git ls-remote --exit-code --heads origin "${STAGING_BRANCH}" >/dev/null 2>&1; then
            git checkout -B "${STAGING_BRANCH}" "origin/${STAGING_BRANCH}"
          else
            git checkout -B "${STAGING_BRANCH}" "origin/main"
            git push -u origin "${STAGING_BRANCH}"
          fi

      - name: Download cached chunk artifacts (backup/recovery)
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: cbbd-2026-chunk*
          path: cbbd_seasons/2025-2026/_artifact_cache
          merge-multiple: true

      - name: Merge chunk CSVs
        if: steps.gate.outputs.should_run == 'true'
        env:
          CBBD_API_KEY: ${{ secrets.CBBD_API_KEY }}
        run: |
          python3 pull_cbbd_lineups_plays_only_chunked_tmp.py \
            --year 2026 \
            --teams-csv "2025_team_results (1).csv" \
            --team-col "team" \
            --season-type both \
            --datasets plays \
            --merge-only \
            --merge-chunks \
            --max-csv-mb 95

      - name: Refresh Bart 2026 datasets
        if: steps.gate.outputs.should_run == 'true'
        run: |
          python3 player_cards_pipeline/scripts/refresh_bart_2026_daily.py \
            --project-root "."

      - name: Commit and push merged outputs to staging
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "${STAGING_BRANCH}" || true
          git add -f cbbd_seasons/2025-2026/tables/ || true
          git add -f cbbd_seasons/2025-2026/manifest/ || true
          git add player_cards_pipeline/data/bt/ || true
          if git diff --cached --quiet; then
            echo "No staging changes to commit"
          else
            git commit -m "Merge 2026 plays chunks + refresh Bart datasets"
            git push origin "${STAGING_BRANCH}"
          fi

      - name: Promote staging to main
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin --prune
          git checkout -B main origin/main
          git merge --no-ff "origin/${STAGING_BRANCH}" -m "Promote 2026 staged pulls to main"
          if git diff --quiet origin/main..HEAD; then
            echo "No promotion changes to push"
            exit 0
          fi
          git push origin main
